<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- FIREBASE CLOUD STORAGE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global state for sharing between module and normal script
        window.salesHistory = [];
        window.saveToCloud = async function() {}; // Stub if cloud fails

        async function initCloud() {
            if (typeof __firebase_config === 'undefined') {
                console.warn("Cloud configuration not found.");
                return;
            }

            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'forte-pos';

                // Mandatory Auth First
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // Listen to Auth State
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        // Setup Realtime Listener
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'reports', 'main');
                        
                        onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                window.salesHistory = docSnap.data().history || [];
                            } else {
                                window.salesHistory = [];
                            }
                            if (typeof window.renderHistory === 'function') window.renderHistory();
                        }, (error) => {
                            console.error("Cloud Listener Error:", error);
                        });

                        // Setup Save Function
                        window.saveToCloud = async function() {
                            try {
                                await setDoc(docRef, { history: window.salesHistory });
                            } catch (e) {
                                console.error("Gagal menyimpan ke cloud:", e);
                            }
                        };
                    }
                });
            } catch (e) {
                console.error("Firebase init failed:", e);
            }
        }

        initCloud();
    </script>

    <script>
        const MENU_DATA = {
            "Espresso Bassed": {
                "Americano": 15000, "Americano Lemonade": 15000, "Berrycano": 18000,
                "Cappucino": 15000, "Espresso": 10000, "Latte": 15000, "Long Black": 15000, "Shaker Espresso": 15000
            },
            "Signature Coffee": {
                "Kopi Susu Stevia": 15000, "Kopi Susu Gula Aren": 15000, "Mochaccino": 15000,
                "Mocca Caribbean Latte": 15000, "Hazelnut Latte": 15000, "Vanilla Latte": 15000,
                "Butterscotch Latte": 15000, "Coconut Latte": 15000, "Caramel Latte": 15000,
                "Salted Caramel Latte": 15000, "Arenoco Latte": 18000, "Arenscoth Latte": 18000,
                "Saltscoth Latte": 18000, "Caramel Scoth Latte": 18000, "Coconilla Latte": 18000
            },
            "Manual Brew": {
                "Japstyle Robusta": 18000, "Japstyle Arabica": 20000, "V60 Robusta": 18000, "V60 Arabica": 20000, "Vietnam Drip": 15000
            },
            "Non Coffee": {
                "Coklat": 15000, "Matcha": 15000, "Oreo": 15000, "Redvelvet": 15000, "Taro": 15000, "Teh Tarik": 13000
            },
            "Harga Teman": {
                "Kopi Tubruk": 10000, "Kopi Tubruk Susu": 12000, "Lemon Tea": 8000
            }
        };

        const ERROR_USER = ["Salah bro", "Nice try", "Tanya bang cameraman.", "Coba tanya azka."];
        const ERROR_PASS = ["Nguawor loh ya cik", "Tanya admin", "Password salah loh ya cik", "Lari terbirit birit"];

        let currentCategory = "Espresso Bassed";
        let cart = [];
        let currentUser = "";
        let pendingConfirmAction = null;

        function startup() {
            lucide.createIcons();
        }

        // CUSTOM MODALS HANDLERS (Replacing alert & confirm)
        function showMsg(title, text) {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-text').innerText = text;
            document.getElementById('modal-msg').classList.remove('hidden');
        }
        function closeMsg() {
            document.getElementById('modal-msg').classList.add('hidden');
        }

        function showConfirm(title, text, actionCallback, isDanger = true) {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-text').innerText = text;
            document.getElementById('confirm-yes-btn').style.background = isDanger ? 'var(--danger)' : 'var(--accent)';
            document.getElementById('confirm-yes-btn').style.color = isDanger ? 'white' : 'black';
            pendingConfirmAction = actionCallback;
            document.getElementById('modal-confirm').classList.remove('hidden');
        }
        function closeConfirm() {
            document.getElementById('modal-confirm').classList.add('hidden');
            pendingConfirmAction = null;
        }
        function executeConfirm() {
            if (pendingConfirmAction) pendingConfirmAction();
            closeConfirm();
        }

        // LOGIN & LOGOUT LOGIC
        function handleLogin() {
            const u = document.getElementById('login-user').value.toLowerCase();
            const p = document.getElementById('login-pass').value;
            
            if (u !== "adi") { showMsg("Login Gagal", ERROR_USER[Math.floor(Math.random() * ERROR_USER.length)]); return; }
            if (p !== "itahcantik") { showMsg("Login Gagal", ERROR_PASS[Math.floor(Math.random() * ERROR_PASS.length)]); return; }
            
            currentUser = u;
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            document.getElementById('display-user').innerText = "KASIR: " + u.toUpperCase();
            
            renderCategories();
            renderMenu();
            if(window.renderHistory) window.renderHistory();
        }

        function attemptLogout() {
            showConfirm("Logout", "Yakin ingin keluar dari akun kasir?", () => {
                currentUser = "";
                cart = [];
                updateCartUI();
                document.getElementById('view-app').classList.add('hidden');
                document.getElementById('view-login').classList.remove('hidden');
                document.getElementById('login-user').value = "";
                document.getElementById('login-pass').value = "";
            }, true);
        }

        // UI & NAVIGATION
        function switchTab(tab) {
            document.getElementById('page-order').classList.toggle('hidden', tab !== 'order');
            document.getElementById('page-report').classList.toggle('hidden', tab !== 'report');
            document.getElementById('tab-order').classList.toggle('active', tab === 'order');
            document.getElementById('tab-report').classList.toggle('active', tab === 'report');
            if(tab === 'report' && window.renderHistory) window.renderHistory();
        }

        function renderCategories() {
            const container = document.getElementById('cat-list');
            container.innerHTML = Object.keys(MENU_DATA).map(cat => `
                <div class="cat-item ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat.toUpperCase()}</div>
            `).join('');
        }
        function setCategory(cat) { currentCategory = cat; renderCategories(); renderMenu(); }

        function renderMenu(filter = "") {
            const container = document.getElementById('menu-list'); container.innerHTML = "";
            Object.entries(MENU_DATA).forEach(([cat, items]) => {
                if (filter === "" && cat !== currentCategory) return;
                Object.entries(items).forEach(([name, price]) => {
                    if (filter !== "" && !name.toLowerCase().includes(filter.toLowerCase())) return;
                    let displayPrice = (name === "Americano") ? "15k - 18k" : (name === "Espresso" ? "10k - 13k" : `Rp ${price.toLocaleString()}`);
                    container.innerHTML += `
                        <div class="menu-card" onclick="handleItemClick('${name}', ${price})">
                            <div class="m-name">${name}</div><div class="m-price">${displayPrice}</div>
                        </div>
                    `;
                });
            });
        }
        function filterMenu() { renderMenu(document.getElementById('search-bar').value); }

        function handleItemClick(name, price) {
            if (name === "Americano" || name === "Espresso") openVariantModal(name, price);
            else addToCart(name, price);
        }

        function openVariantModal(name, basePrice) {
            const options = document.getElementById('var-options');
            document.getElementById('var-title').innerText = name;
            let variants = name === "Americano" ? [{ l: "Single Shot", p: 15000 }, { l: "Double Shot", p: 18000 }] : [{ l: "Single Shot", p: 10000 }, { l: "Double Shot", p: 13000 }];
            options.innerHTML = variants.map(v => `
                <button class="btn-main" style="background:#334155; color:white; justify-content:space-between;" onclick="addToCart('${name} (${v.l})', ${v.p}); closeVariant();">
                    <span>${v.l}</span><span>Rp ${v.p.toLocaleString()}</span>
                </button>
            `).join('');
            document.getElementById('modal-variant').classList.remove('hidden');
        }
        function closeVariant() { document.getElementById('modal-variant').classList.add('hidden'); }

        // CART LOGIC
        function addToCart(name, price) {
            const exist = cart.find(i => i.name === name);
            if(exist) exist.qty++; else cart.push({ name, price, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const qty = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const bar = document.getElementById('cart-bar');
            if(qty > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-count').innerText = qty + " Item";
                document.getElementById('cart-total-bar').innerText = "Rp " + total.toLocaleString();
            } else bar.classList.add('hidden');
        }

        function openCart() { document.getElementById('modal-cart').classList.remove('hidden'); renderCartList(); }
        function closeCart() { document.getElementById('modal-cart').classList.add('hidden'); }

        function renderCartList() {
            const list = document.getElementById('cart-items-list');
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            list.innerHTML = cart.map((item, idx) => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #334155">
                    <div><div style="font-weight:700;">${item.name}</div><div style="font-size:12px; color:var(--accent)">Rp ${item.price.toLocaleString()}</div></div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <button class="btn-circle" style="background:#450a0a; color:#ef4444" onclick="updateQty(${idx}, -1)">-</button>
                        <span style="font-weight:700; width:20px; text-align:center;">${item.qty}</span>
                        <button class="btn-circle" style="background:#064e3b; color:#22c55e" onclick="updateQty(${idx}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('cart-total-modal').innerText = "Rp " + total.toLocaleString();
            lucide.createIcons();
        }

        function updateQty(idx, delta) {
            cart[idx].qty += delta;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            if(cart.length === 0) closeCart();
            renderCartList(); updateCartUI();
        }

        // TRANSACTION & CLOUD SYNC
        async function processPayment(method) {
            if(cart.length === 0) return;
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const dateStr = new Date().toLocaleDateString('en-GB'); 
            
            window.salesHistory.push({
                id: Date.now(),
                items: JSON.parse(JSON.stringify(cart)),
                total: total,
                method: method,
                date: dateStr
            });

            await window.saveToCloud();
            
            cart = []; updateCartUI(); closeCart();
            if(window.renderHistory) window.renderHistory();
            showMsg("Sukses", `Pesanan berhasil dibayar menggunakan ${method === 'C' ? 'Cash' : 'QRIS'} dan tersimpan di Cloud.`);
        }

        window.renderHistory = function() {
            const container = document.getElementById('grouped-history');
            let overallTotal = 0;
            
            if(!window.salesHistory || window.salesHistory.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px 0; color:var(--text-muted)">Belum ada data penjualan.</div>`;
                document.getElementById('stat-total').innerText = "Rp 0";
                return;
            }

            const groups = {};
            window.salesHistory.forEach((sale) => {
                overallTotal += sale.total;
                if(!groups[sale.date]) groups[sale.date] = { total: 0, items: {} };
                groups[sale.date].total += sale.total;
                
                sale.items.forEach(item => {
                    const key = item.name;
                    if(!groups[sale.date].items[key]) groups[sale.date].items[key] = { name: item.name, price: item.price, cash: 0, qris: 0 };
                    if(sale.method === 'C') groups[sale.date].items[key].cash += item.qty;
                    else groups[sale.date].items[key].qris += item.qty;
                });
            });

            container.innerHTML = Object.entries(groups).reverse().map(([date, data]) => `
                <div class="date-group">
                    <div class="date-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <span style="font-weight:800; display:flex; align-items:center; gap:8px;"><i data-lucide="calendar" size="14"></i> ${date}</span>
                        <span style="color:var(--accent); font-weight:800;">Rp ${data.total.toLocaleString()}</span>
                    </div>
                    <div class="date-content hidden" style="padding-bottom:15px;">
                        ${Object.entries(data.items).map(([name, info]) => `
                            <div class="summary-item" style="text-align: left;">
                                <div style="flex:1">
                                    <div style="font-weight:700;">${info.name}</div>
                                    <div style="font-size:10px; color:var(--text-muted)">QRIS: ${info.qris} | CASH: ${info.cash}</div>
                                </div>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <button class="btn-edit-qty" onclick="editHistoryQty('${date}', '${name}', -1)">-</button>
                                    <button class="btn-edit-qty" onclick="editHistoryQty('${date}', '${name}', 1)">+</button>
                                    <button onclick="attemptRemoveItem('${date}', '${name}')" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i data-lucide="trash-2" size="18"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('stat-total').innerText = "Rp " + overallTotal.toLocaleString();
            lucide.createIcons();
        };

        async function editHistoryQty(date, itemName, delta) {
            const saleIndex = window.salesHistory.findIndex(s => s.date === date && s.items.some(i => i.name === itemName));
            if(saleIndex !== -1) {
                const sale = window.salesHistory[saleIndex];
                const item = sale.items.find(i => i.name === itemName);
                item.qty += delta;
                
                if(item.qty <= 0) sale.items = sale.items.filter(i => i.name !== itemName);
                sale.total = sale.items.reduce((a, b) => a + (b.price * b.qty), 0);
                if(sale.items.length === 0) window.salesHistory.splice(saleIndex, 1);
                
                await window.saveToCloud();
                window.renderHistory();
            }
        }

        function attemptRemoveItem(date, itemName) {
            showConfirm("Hapus Pesanan", `Yakin ingin menghapus ${itemName} dari transaksi tanggal ${date}?`, async () => {
                window.salesHistory = window.salesHistory.filter(s => {
                    if(s.date === date) {
                        s.items = s.items.filter(i => i.name !== itemName);
                        s.total = s.items.reduce((a, b) => a + (b.price * b.qty), 0);
                        return s.items.length > 0;
                    }
                    return true;
                });
                await window.saveToCloud();
                window.renderHistory();
            }, true);
        }

        function attemptClearData() {
            showConfirm("Peringatan Keras", "Menghapus semua data juga akan MENGHAPUS DATA DARI CLOUD secara permanen. Lanjutkan?", async () => {
                window.salesHistory = [];
                await window.saveToCloud();
                window.renderHistory();
                showMsg("Berhasil", "Semua data laporan telah dikosongkan.");
            }, true);
        }
    </script>
